<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>방학 학습 캘린더</title>
<style>
  :root{
    --bg:#EAEDF3;--surface:#fff;--ink:#1E2230;--muted:#6C7280;--line:#E4E7EE;
    --deep:#242A54;--deep2:#333C7A;--accent:#E6A23C;--accent-soft:#FBEED6;
    --kor:#C25E7A;--mat:#3F6FB5;--his:#B8863B;--soc:#3E8E7E;--sci:#7B62B8;
    --sans:"Pretendard","Apple SD Gothic Neo","Malgun Gothic","Noto Sans KR",system-ui,-apple-system,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{-webkit-text-size-adjust:100%}
  body{font-family:var(--sans);background:var(--bg);color:var(--ink);line-height:1.55;
    -webkit-font-smoothing:antialiased;letter-spacing:-.01em}
  .wrap{max-width:640px;margin:0 auto;padding:0 14px 56px}

  .hero{background:linear-gradient(150deg,var(--deep),var(--deep2));color:#fff;
    border-radius:0 0 24px 24px;padding:26px 20px 22px;margin:0 -14px 20px}
  .hero .eyebrow{font-size:11.5px;letter-spacing:.2em;text-transform:uppercase;color:#B9BEE8;font-weight:600}
  .hero h1{font-size:26px;font-weight:800;letter-spacing:-.03em;margin-top:8px}
  .hero .sub{color:#C9CDEC;font-size:13.5px;margin-top:9px}
  .chips{display:flex;gap:8px;flex-wrap:wrap;margin-top:15px}
  .chip{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.16);
    padding:6px 11px;border-radius:999px;font-size:12px;font-weight:600}
  .chip b{color:var(--accent);font-variant-numeric:tabular-nums}

  .legend{display:flex;flex-wrap:wrap;gap:9px;margin:2px 0 16px;font-size:11.5px;color:#4A4F5C}
  .legend span{display:flex;align-items:center;gap:5px}
  .legend i{width:10px;height:10px;border-radius:3px;flex:none}

  .prog{background:var(--surface);border:1px solid var(--line);border-radius:12px;
    padding:11px 14px;margin-bottom:18px}
  .prog-top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px}
  .prog-top b{font-size:15px;font-variant-numeric:tabular-nums}
  .prog-top small{color:var(--muted);font-size:12px}
  .pbar{height:8px;background:#EAECF2;border-radius:99px;overflow:hidden}
  .pbar i{display:block;height:100%;width:0;background:linear-gradient(90deg,var(--deep2),var(--accent));transition:width .5s}

  .month{margin-bottom:22px}
  .month h2{font-size:16px;font-weight:800;margin-bottom:10px;padding-left:2px}
  .dow{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;margin-bottom:5px}
  .dow span{text-align:center;font-size:11px;font-weight:700;color:var(--muted)}
  .dow span:nth-child(6){color:#3F6FB5}.dow span:nth-child(7){color:#C0392B}
  .grid{display:grid;grid-template-columns:repeat(7,1fr);gap:5px}
  .cell{aspect-ratio:1/1.08;border-radius:10px;background:var(--surface);border:1px solid var(--line);
    padding:5px 4px 4px;display:flex;flex-direction:column;cursor:pointer;position:relative;
    transition:transform .1s,box-shadow .15s}
  .cell.empty{background:transparent;border:none;cursor:default}
  .cell.active:active{transform:scale(.95)}
  .cell .dn{font-size:12.5px;font-weight:700;font-variant-numeric:tabular-nums;line-height:1}
  .cell .tp{font-size:8.5px;font-weight:700;margin-top:auto;line-height:1.1;
    padding:2px 3px;border-radius:4px;color:#fff;text-align:center;
    overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
  .cell .cnt{position:absolute;top:4px;right:5px;font-size:8.5px;color:var(--muted);font-weight:700}
  .cell.sel{box-shadow:0 0 0 2.5px var(--deep);border-color:var(--deep)}
  .cell.today .dn{color:var(--accent)}
  .cell.today::before{content:"";position:absolute;top:5px;left:5px;width:5px;height:5px;
    border-radius:50%;background:var(--accent)}

  .detail{background:var(--surface);border:1px solid var(--line);border-radius:16px;
    padding:0;overflow:hidden;scroll-margin-top:12px}
  .dhead{padding:15px 18px;color:#fff;display:flex;align-items:center;gap:10px}
  .dhead .dd{font-size:20px;font-weight:800;font-variant-numeric:tabular-nums}
  .dhead .dw{font-size:13px;opacity:.85;font-weight:600}
  .dhead .dt{margin-left:auto;font-size:12px;font-weight:700;background:rgba(255,255,255,.18);
    padding:4px 11px;border-radius:999px}
  .dbody{padding:8px 16px 16px}
  .grp{margin-top:12px}
  .grp-l{font-size:11.5px;font-weight:800;letter-spacing:.02em;color:var(--muted);
    margin:0 0 7px 2px;display:flex;align-items:center;gap:6px}
  .grp-l .badge{font-size:10px;color:#8A5A12;background:var(--accent-soft);border:1px solid var(--accent);
    padding:1px 6px;border-radius:5px;font-weight:700}
  .task{display:flex;align-items:flex-start;gap:10px;padding:9px 10px;border-radius:10px;
    border:1px solid var(--line);margin-bottom:6px;cursor:pointer;transition:background .12s}
  .task:active{background:#F5F6FA}
  .task.done{background:#F6F8F6;border-color:#E0E6E0}
  .cbox{width:19px;height:19px;border-radius:6px;border:2px solid #C7CCD6;flex:none;margin-top:1px;
    display:flex;align-items:center;justify-content:center;transition:all .15s}
  .task.done .cbox{background:var(--soc);border-color:var(--soc)}
  .cbox svg{width:11px;height:11px;opacity:0}
  .task.done .cbox svg{opacity:1}
  .tinfo{flex:1;min-width:0}
  .ttxt{font-size:13.5px;font-weight:600}
  .task.done .ttxt{color:var(--muted);text-decoration:line-through}
  .tmeta{display:flex;align-items:center;gap:6px;margin-top:2px}
  .sdot{width:8px;height:8px;border-radius:50%;flex:none}
  .stag{font-size:10.5px;color:var(--muted);font-weight:600}
  .note{margin-top:14px;font-size:12px;color:#565C6C;background:#EEF0F6;border-radius:10px;
    padding:10px 12px;line-height:1.6}
  .note b{color:var(--ink)}
  .empty-day{padding:22px;text-align:center;color:var(--muted);font-size:13px}

  .foot{margin-top:26px;font-size:12px;color:#565C6C;text-align:center;line-height:1.7}
  .foot b{color:var(--ink)}
  @media (prefers-reduced-motion:reduce){*{transition:none!important}}
</style>
</head>
<body>
<div class="wrap">
  <header class="hero">
    <div class="eyebrow">Study Calendar · Brain Science</div>
    <h1>방학 학습 캘린더</h1>
    <p class="sub">날짜를 누르면 그날 할 일이 떠요. 신규 학습 · 간격 복습(+1·+3·+7일) · 문제풀이 · 모의고사가 날짜별로 짜여 있어요.</p>
    <div class="chips">
      <div class="chip">7/14 – 8/19</div>
      <div class="chip">종료까지 <b id="dday">–</b>일</div>
      <div class="chip">D<b id="dpass">–</b></div>
    </div>
  </header>

  <div class="legend">
    <span><i style="background:#242A54"></i>신규 학습</span>
    <span><i style="background:#E6A23C"></i>복습</span>
    <span><i style="background:#7B62B8"></i>문제·심화</span>
    <span><i style="background:#C0392B"></i>모의고사</span>
    <span><i style="background:#9AA0AE"></i>복습·휴식</span>
  </div>

  <div class="prog">
    <div class="prog-top"><b><span id="pc">0</span> / <span id="pt">0</span> 완료</b><small id="pp">0%</small></div>
    <div class="pbar"><i id="pf"></i></div>
  </div>

  <div id="months"></div>

  <div class="detail" id="detail"></div>

  <p class="foot"><b>복습</b>은 다시 읽기가 아니라 <b>안 보고 백지에 떠올려 쓰기</b>예요.<br>일정이 밀려도 체크는 남으니 다음 날 이어서 하면 됩니다.</p>
</div>

-08-14", "md": "8/14", "dow": "금", "tasks": [{"kind": "prac", "subj": "his", "txt": "약점 과목 집중 복습(직접 선택)"}], "note": "틀린 문제는 오답노트로", "type": "약점 보완", "color": "#7B62B8"}, {"date": "2026-08-15", "md": "8/15", "dow": "토", "tasks": [{"kind": "prac", "subj": "sci", "txt": "전 과목 핵심 요약 훑기"}], "note": "틀린 문제는 오답노트로", "type": "약점 보완", "color": "#7B62B8"}, {"date": "2026-08-16", "md": "8/16", "dow": "일", "tasks": [], "note": "완전 휴식 — 잘 쉬는 것도 공부예요. 산책·충분한 수면이 기억을 정리해 줍니다.", "type": "쉬는 날", "color": "#9AA0AE"}, {"date": "2026-08-17", "md": "8/17", "dow": "월", "tasks": [{"kind": "test", "subj": "soc", "txt": "모의 테스트 ① 사회"}, {"kind": "test", "subj": "his", "txt": "모의 테스트 ① 역사"}], "note": "자기 전 10분: 오늘 틀린 것만 다시 훑기", "type": "모의고사", "color": "#C0392B"}, {"date": "2026-08-18", "md": "8/18", "dow": "화", "tasks": [{"kind": "test", "subj": "sci", "txt": "모의 테스트 ② 과학"}, {"kind": "test", "subj": "kor", "txt": "모의 테스트 ② 국어"}], "note": "자기 전 10분: 오늘 틀린 것만 다시 훑기", "type": "모의고사", "color": "#C0392B"}, {"date": "2026-08-19", "md": "8/19", "dow": "수", "tasks": [{"kind": "test", "subj": "soc", "txt": "전 과목 약점 최종 점검"}, {"kind": "test", "subj": "his", "txt": "오답 다시 풀기"}], "note": "자기 전 10분: 오늘 틀린 것만 다시 훑기", "type": "마무리", "color": "#C0392B"}];
const SUB={kor:'#C25E7A',mat:'#3F6FB5',his:'#B8863B',soc:'#3E8E7E',sci:'#7B62B8'};
const SNAME={kor:'국어',mat:'수학',his:'역사',soc:'사회',sci:'과학'};
const KIND={new:'신규',rev:'복습',prac:'심화',test:'모의',};
const byDate={};DAYS.forEach(d=>byDate[d.date]=d);

/* storage */
const KEY='cal-v2';const mem={};
async function load(){try{const r=await window.storage.get(KEY);if(r&&r.value)return JSON.parse(r.value);}catch(e){}return mem[KEY]||{};}
async function persist(){mem[KEY]=STATE;try{await window.storage.set(KEY,JSON.stringify(STATE),false);}catch(e){}}
let STATE={};

const todayISO=(()=>{const n=new Date();return n.getFullYear()+'-'+String(n.getMonth()+1).padStart(2,'0')+'-'+String(n.getDate()).padStart(2,'0');})();
let selected=byDate[todayISO]?todayISO:DAYS[0].date;

function shortType(t){return {'신규 학습':'신규','복습·휴식':'복습','문제풀이':'문제','실전·오답':'실전','통합 복습':'복습','약점 보완':'약점','모의고사':'모의','마무리':'마무리'}[t]||t;}

function renderMonths(){
  const box=document.getElementById('months');
  const months=[[2026,7,'7월'],[2026,8,'8월']];
  box.innerHTML=months.map(([y,m,lab])=>{
    const first=new Date(y,m-1,1);
    const lead=(first.getDay()+6)%7; // Mon-first
    const dim=new Date(y,m,0).getDate();
    let cells='';
    for(let i=0;i<lead;i++)cells+='<div class="cell empty"></div>';
    for(let day=1;day<=dim;day++){
      const iso=y+'-'+String(m).padStart(2,'0')+'-'+String(day).padStart(2,'0');
      const d=byDate[iso];
      if(!d){cells+='<div class="cell empty"><div class="dn" style="color:#C2C7D2">'+day+'</div></div>';continue;}
      const cls=['cell','active'];if(iso===selected)cls.push('sel');if(iso===todayISO)cls.push('today');
      const n=d.tasks.length;
      cells+='<div class="'+cls.join(' ')+'" data-d="'+iso+'">'
        +'<div class="dn">'+day+'</div>'
        +(n?'<div class="cnt">'+n+'</div>':'')
        +'<div class="tp" style="background:'+d.color+'">'+shortType(d.type)+'</div></div>';
    }
    return '<div class="month"><h2>'+lab+'</h2>'
      +'<div class="dow"><span>월</span><span>화</span><span>수</span><span>목</span><span>금</span><span>토</span><span>일</span></div>'
      +'<div class="grid">'+cells+'</div></div>';
  }).join('');
}

function tid(date,i){return date+'#'+i;}
function renderDetail(){
  const d=byDate[selected];const el=document.getElementById('detail');
  if(!d){el.innerHTML='<div class="empty-day">이 날은 계획이 없어요.</div>';return;}
  const [Y,M,D]=d.date.split('-');
  // group tasks
  const groups={};
  d.tasks.forEach((t,i)=>{
    let g=KIND[t.kind]||'할 일';
    if(t.kind==='rev'&&t.off)g='복습 (+'+t.off+'일 전 배운 것)';
    (groups[g]=groups[g]||[]).push({t,i});
  });
  const order=Object.keys(groups).sort((a,b)=>{
    const rank=x=>x.startsWith('신규')?0:x.startsWith('복습 (+1')?1:x.startsWith('복습 (+3')?2:x.startsWith('복습 (+7')?3:x.startsWith('복습')?4:x.startsWith('심화')?5:x.startsWith('모의')?6:7;
    return rank(a)-rank(b);
  });
  let body='';
  order.forEach(g=>{
    body+='<div class="grp"><div class="grp-l">'+g+'</div>';
    groups[g].forEach(({t,i})=>{
      const id=tid(d.date,i);const done=!!STATE[id];
      body+='<div class="task'+(done?' done':'')+'" data-t="'+id+'">'
        +'<div class="cbox"><svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="4"><path d="M4 12l5 5L20 6"/></svg></div>'
        +'<div class="tinfo"><div class="ttxt">'+t.txt+'</div>'
        +'<div class="tmeta"><span class="sdot" style="background:'+SUB[t.subj]+'"></span>'
        +'<span class="stag">'+SNAME[t.subj]+'</span></div></div></div>';
    });
    body+='</div>';
  });
  if(!d.tasks.length)body='<div class="empty-day">할 일이 없는 날이에요. 푹 쉬기!</div>';
  el.innerHTML='<div class="dhead" style="background:'+d.color+'">'
      +'<div class="dd">'+(+M)+'/'+(+D)+'</div><div class="dw">'+d.dow+'요일</div>'
      +'<div class="dt">'+d.type+'</div></div>'
    +'<div class="dbody">'+body
    +(d.note?'<div class="note"><b>💡</b> '+d.note+'</div>':'')+'</div>';
}

function updateProgress(){
  let total=0,done=0;
  DAYS.forEach(d=>d.tasks.forEach((t,i)=>{total++;if(STATE[tid(d.date,i)])done++;}));
  document.getElementById('pc').textContent=done;
  document.getElementById('pt').textContent=total;
  const pct=total?Math.round(done/total*100):0;
  document.getElementById('pp').textContent=pct+'%';
  document.getElementById('pf').style.width=pct+'%';
}
function updateDday(){
  const end=new Date(2026,7,19),st=new Date(2026,6,14),now=new Date();
  document.getElementById('dday').textContent=Math.max(0,Math.ceil((end-now)/86400000));
  const passed=Math.floor((now-st)/86400000);
  document.getElementById('dpass').textContent=(passed<0?'-':'+')+Math.abs(passed);
}

document.addEventListener('click',e=>{
  const cell=e.target.closest('.cell.active');
  if(cell){selected=cell.dataset.d;renderMonths();renderDetail();
    document.getElementById('detail').scrollIntoView({behavior:'smooth',block:'start'});return;}
  const task=e.target.closest('.task');
  if(task){const id=task.dataset.t;STATE[id]=!STATE[id];persist();
    task.classList.toggle('done',STATE[id]);updateProgress();renderMonths();}
});

(async function(){
  STATE=await load();
  updateDday();renderMonths();renderDetail();updateProgress();
})();
</script>
